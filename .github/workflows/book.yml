name: Devonshire live booking

# The Jun-2026 one-shot is DONE (Jul 12 + Jul 15 booked), so there is no active
# cron — leaving "45 8 18 6 *" would re-fire every June 18. To arm for a future
# release, uncomment `schedule` and set `release_at`/`run_for_min` defaults below.
#
# Timing model (fixes the Jun-18 miss): the job sleeps until `release_at`, then
# probes for `run_for_min` minutes measured from the ACTUAL start — so a late
# scheduler launch still gets a full window instead of finding an elapsed stop
# time and giving up. `give-up-after-min` abandons only a wildly-late misfire.
on:
  # schedule:
  #   - cron: '45 8 18 6 *'   # example: 08:45 UTC; script then waits for release_at
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Fill forms but never submit (safe test)'
        type: boolean
        default: false
      nights:
        description: 'Nights "NN:YYYY-MM-DD,..." (blank = Jul 12-15)'
        type: string
        default: ''
      window_start:
        type: string
        default: '19:00'
      window_end:
        type: string
        default: '20:00'
      release_at:
        description: 'ISO instant to START probing (blank = now)'
        type: string
        default: ''
      run_for_min:
        description: 'Probe for this many minutes after starting'
        type: string
        default: '90'

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  book:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Book up to 2 of the nights, party of 2
        env:
          BOOK_NAME_12: ${{ secrets.BOOK_NAME_12 }}
          BOOK_EMAIL_12: ${{ secrets.BOOK_EMAIL_12 }}
          BOOK_PHONE_12: ${{ secrets.BOOK_PHONE_12 }}
          BOOK_NAME_13: ${{ secrets.BOOK_NAME_13 }}
          BOOK_EMAIL_13: ${{ secrets.BOOK_EMAIL_13 }}
          BOOK_PHONE_13: ${{ secrets.BOOK_PHONE_13 }}
          BOOK_NAME_14: ${{ secrets.BOOK_NAME_14 }}
          BOOK_EMAIL_14: ${{ secrets.BOOK_EMAIL_14 }}
          BOOK_PHONE_14: ${{ secrets.BOOK_PHONE_14 }}
          BOOK_NAME_15: ${{ secrets.BOOK_NAME_15 }}
          BOOK_EMAIL_15: ${{ secrets.BOOK_EMAIL_15 }}
          BOOK_PHONE_15: ${{ secrets.BOOK_PHONE_15 }}
        run: |
          node src/book.js --all \
            --nights "${{ inputs.nights || '12:2026-07-12,13:2026-07-13,14:2026-07-14,15:2026-07-15' }}" \
            --max-bookings 2 \
            --window-start "${{ inputs.window_start || '19:00' }}" \
            --window-end "${{ inputs.window_end || '20:00' }}" \
            --release-at "${{ inputs.release_at }}" \
            --run-for-min "${{ inputs.run_for_min || '90' }}" \
            --retry-ms 30000 \
            --dry-run "${{ inputs.dry_run || 'false' }}"
