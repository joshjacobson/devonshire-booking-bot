name: Devonshire live booking

# Currently armed to CHASE Fri Jul 17 (releases Thu Jun 25, 10:30 London = 09:30 UTC).
# Cron fires early at 07:00 UTC; the script then sleeps until `release_at` (09:29 UTC)
# and probes for `run_for_min` minutes measured from the ACTUAL start — so even a
# late GitHub launch still gets a full window instead of giving up (the Jun-18 fix).
# Jul 17 is booked under a DISTINCT identity (BOOK_*_17) from the kept Jul 12.
on:
  schedule:
    - cron: '0 7 25 6 *' # 07:00 UTC, 25 June
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
      nights:
        description: 'Nights "NN:YYYY-MM-DD,..."'
        type: string
        default: ''
      max_bookings:
        type: string
        default: ''
      window_start:
        type: string
        default: ''
      window_end:
        type: string
        default: ''
      release_at:
        type: string
        default: ''
      run_for_min:
        type: string
        default: ''

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  book:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Chase Jul 17 (party of 2, 19:00-20:00)
        env:
          BOOK_NAME_17: ${{ secrets.BOOK_NAME_17 }}
          BOOK_EMAIL_17: ${{ secrets.BOOK_EMAIL_17 }}
          BOOK_PHONE_17: ${{ secrets.BOOK_PHONE_17 }}
        run: |
          node src/book.js --all \
            --nights "${{ inputs.nights || '17:2026-07-17' }}" \
            --max-bookings "${{ inputs.max_bookings || '1' }}" \
            --window-start "${{ inputs.window_start || '19:00' }}" \
            --window-end "${{ inputs.window_end || '20:00' }}" \
            --release-at "${{ inputs.release_at || '2026-06-25T09:29:00Z' }}" \
            --run-for-min "${{ inputs.run_for_min || '180' }}" \
            --retry-ms 30000 \
            --dry-run "${{ inputs.dry_run || 'false' }}"
