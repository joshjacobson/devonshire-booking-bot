name: Devonshire live booking

on:
  # Fires 08:45 UTC on 18 June. The script then SLEEPS until 09:29 UTC
  # (= 10:29 London, 1 min before the 10:30 table release) and probes every 30s.
  # Early fire absorbs GitHub's scheduled-launch jitter.
  schedule:
    - cron: '45 8 18 6 *'
  # Manual run. With no inputs it uses the LIVE config below (a safe backup arming).
  # With dry_run + overrides it can smoke-test the real job without booking.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Fill forms but never submit (safe test)'
        type: boolean
        default: false
      nights:
        description: 'Override nights "NN:YYYY-MM-DD,..." (blank = live Jul 12-15)'
        type: string
        default: ''
      window_start:
        type: string
        default: ''
      window_end:
        type: string
        default: ''
      release_at:
        description: 'ISO start-probing time (blank = live 09:29Z Jun 18)'
        type: string
        default: ''
      stop_at:
        type: string
        default: ''

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  book:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Book up to 2 of the 4 nights (Jul 12-15), 19:00-20:00, party of 2
        env:
          # All four nights run in ONE process sharing a cap of 2 total bookings,
          # so the moment 2 confirm, the other 2 stop. Each night = own identity.
          BOOK_NAME_12: ${{ secrets.BOOK_NAME_12 }}
          BOOK_EMAIL_12: ${{ secrets.BOOK_EMAIL_12 }}
          BOOK_PHONE_12: ${{ secrets.BOOK_PHONE_12 }}
          BOOK_NAME_13: ${{ secrets.BOOK_NAME_13 }}
          BOOK_EMAIL_13: ${{ secrets.BOOK_EMAIL_13 }}
          BOOK_PHONE_13: ${{ secrets.BOOK_PHONE_13 }}
          BOOK_NAME_14: ${{ secrets.BOOK_NAME_14 }}
          BOOK_EMAIL_14: ${{ secrets.BOOK_EMAIL_14 }}
          BOOK_PHONE_14: ${{ secrets.BOOK_PHONE_14 }}
          BOOK_NAME_15: ${{ secrets.BOOK_NAME_15 }}
          BOOK_EMAIL_15: ${{ secrets.BOOK_EMAIL_15 }}
          BOOK_PHONE_15: ${{ secrets.BOOK_PHONE_15 }}
        run: |
          node src/book.js --all \
            --nights "${{ inputs.nights || '12:2026-07-12,13:2026-07-13,14:2026-07-14,15:2026-07-15' }}" \
            --max-bookings 2 \
            --window-start "${{ inputs.window_start || '19:00' }}" \
            --window-end "${{ inputs.window_end || '20:00' }}" \
            --release-at "${{ inputs.release_at || '2026-06-18T09:29:00Z' }}" \
            --stop-at "${{ inputs.stop_at || '2026-06-18T10:30:00Z' }}" \
            --retry-ms 30000 \
            --dry-run "${{ inputs.dry_run || 'false' }}"
